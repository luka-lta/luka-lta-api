services:
  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    image: ghcr.io/luka-lta/luka-lta-api/api-nginx:production

  php-fpm:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: production
    image: ghcr.io/luka-lta/luka-lta-api/api-php-fpm:production